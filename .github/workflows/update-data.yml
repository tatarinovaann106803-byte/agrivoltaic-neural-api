name: Update Dataset and Retrain Models

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pandas numpy scikit-learn requests
      
      - name: Update datasets and retrain models
        run: |
          python prepare_dataset_advanced.py
          python smart_train.py
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dataset/ models/ data/
          git commit -m "Auto-update: refresh datasets and retrain models $(date '+%Y-%m-%d')" || exit 0
          git push
