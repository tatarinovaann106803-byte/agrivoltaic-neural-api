name: Update Dataset and Retrain Models

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pandas numpy scikit-learn requests
      
      - name: Download data from Google Sheets
        run: python download_data.py
      
      - name: Prepare sector datasets
        run: python prepare_dataset_advanced.py
      
      - name: Clean datasets (remove NaN)
        run: |
          python -c "
import pandas as pd
for sector in ['crop_farming', 'aquaculture', 'forestry']:
    df = pd.read_csv(f'dataset/sector_data/{sector}.csv')
    before = len(df)
    df = df.dropna()
    df.to_csv(f'dataset/sector_data/{sector}.csv', index=False)
    print(f'{sector}: {before} -> {len(df)} rows')
"
      
      - name: Train Random Forest models
        run: python train_advanced_models.py
      
      - name: Train Neural Network models
        run: python train_neural_models.py || echo "Neural network training skipped"
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dataset/ models/
          git commit -m "Auto-update: refresh datasets and retrain models $(date '+%Y-%m-%d')" || exit 0
          git push
