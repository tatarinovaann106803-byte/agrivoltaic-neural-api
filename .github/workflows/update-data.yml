name: Update Dataset and Retrain Models

on:
  schedule:
    - cron: "0 0 * * 0"          # каждое воскресенье в 00:00 UTC
  workflow_dispatch:              # возможность запуска вручную

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pandas numpy scikit-learn requests
      
      - name: Download data from Google Sheets
        run: python download_data.py
      
      - name: Prepare sector datasets
        run: python prepare_dataset_advanced.py
      
      - name: Retrain models
        run: python smart_train.py
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dataset/ models/
          git commit -m "Auto-update: refresh datasets and retrain models $(date '+%Y-%m-%d')" || exit 0
          git push
